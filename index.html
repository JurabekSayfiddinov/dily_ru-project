<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <header class="w-[100%] border-t-[5px] border-t-[#00C65E] pt-[10px] border-b-[grey] border-b-[0.5px] pb-[10px]">
        <div class="max-w-300 m-auto flex items-center justify-around">
            <img src="./images/Logo (2).png" alt="">
            <nav class="flex items-center gap-[30px]">
                <p class="hover:bg-[#00c65c6f] hover:p-[5px] hover:border-b-[2px] hover:border-b-[#00C65E] duration-150">Доска объявлений</p>
                <p class="hover:bg-[#00c65c6f] hover:p-[5px] hover:border-b-[2px] hover:border-b-[#00C65E] duration-150">Сервисный центр</p>
                <p class="hover:bg-[#00c65c6f] hover:p-[5px] hover:border-b-[2px] hover:border-b-[#00C65E] duration-150">Интернет-магазин Dily.ru</p>
                <p class="hover:bg-[#00c65c6f] hover:p-[5px] hover:border-b-[2px] hover:border-b-[#00C65E] duration-150">Скупка</p>
            </nav>
           <div class="flex items-center gap-[25px]">
            <div class="flex items-center gap-[10px]">
                <img src="./images/off.png" alt="">
                <small>Москва</small>
            </div>
            <div class="flex items-center gap-[10px]">
                <img src="./images/default.png" alt="">
                <small class="font-bold">Вход/ регистрация</small>
            </div>
            </div>
        </div>
    </header>
    <div class="w-[100%] h-[50px] bg-[#F7F7F7] border-b-[grey] border-b-[0.5px]">
        <div class="max-w-300 m-auto flex justify-around items-center">
            <div class="flex items-center gap-[15px]">
                <img src="./images/default — копия.png" alt="">
                <p>Каталог товаров</p>
            </div>
            <div class="flex items-center gap-[15px]">
                <img src="./images/default — копия.png" alt="">
                <p>Доставка и оплата</p>
            </div>
            <div class="bg-white flex items-center rounded-l-[15px] rounded-r-[15px] w-[230px] justify-around">
                <img src="./images/Vector.png" alt="">
                <small class="text-gray-500">Я хочу купить</small>
                <div>
                    <p class="bg-[#DADCDC] rounded-r-[15px] p-[10px]">Найти</p>
                </div>
            </div>
            <div class="flex items-center gap-[15px]">
                <p>Поддержка</p>
                <img src="./images/Frame 380.png" alt="">
            </div>
        </div>
    </div>
    <main>
        <section class="w-[100%] h-[500px] border-dashed border-[1px]" style="background-image: url(./images/Rectangle\ 286.png);">
            <div class="max-w-300 m-auto flex justify-around ">
                <div class="flex flex-col gap-[30px] relative top-[150px]">
                    <h1 class="text-4xl text-[#FFB762]">Скидки от <span class="text-[#00C65E] font-bold">Dily</span></h1>
                    <p class="text-[#FFB762] text-xl relative left-[150px]">На смартфоны Samsung</p>
                    <p class="bg-[#00C65E] p-[10px] text-white w-[150px] rounded-[15px] text-center">Подробнее</p>
                </div>
                <div>
                    <img src="./images/Polygon 8.png" alt="">
                    <img class="relative top-[-200px] right-[100px]" src="./images/image 175.png" alt="">
                    <img class="relative bottom-[200px] left-[150px]" src="./images/Polygon 11.png" alt="">
                    <img class="relative bottom-[400px] left-[150px]" src="./images/image 173.png" alt="">
                    <img class="relative bottom-[900px] left-[200px]" src="./images/image 174.png" alt="">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
